<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Management Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#0f172a,#1e3a8a);
        }

        .login-container{
            width:350px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .login-container h1{
            text-align:center;
            margin-bottom:25px;
            color:#1e3a8a;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            color:#333;
            font-weight:bold;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#2563eb;
        }

        .login-btn{
            width:100%;
            padding:12px;
            background:#2563eb;
            border:none;
            color:white;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#1d4ed8;
        }

        .footer-text{
            text-align:center;
            margin-top:15px;
            color:#666;
            font-size:14px;
        }

    </style>

</head>
<body>

    <div class="login-container">

        <h1>Sales System</h1>

        <form method="POST">

            {% csrf_token %}

            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password">
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

        <div class="footer-text">
            Powered by Alfred
        </div>

    </div>

</body>
</html>
